services:
  mongodb:
    image: mongo:7
    container_name: nfz-starter-mongodb
    restart: unless-stopped
    ports:
      - '${MONGODB_PORT:-27037}:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-changeMe}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-nfz_starter}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [CMD, mongosh, --quiet, --eval, 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mongodb_data:

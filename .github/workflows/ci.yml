name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NUXT_TELEMETRY_DISABLED: '1'
  NODE_OPTIONS: --max-old-space-size=4096

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, build module, playground and docs
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint:fix

      - name: Template sanity check
        run: bun run sanity:templates

      - name: Typecheck
        run: bun run typecheck

      - name: Build module
        run: bun run prepare

      - name: Build package
        run: bun run build

      - name: Build docs
        run: bun run docs:build

      - name: CLI smoke
        run: bun run cli:smoke

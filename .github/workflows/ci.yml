name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NUXT_TELEMETRY_DISABLED: '1'
  NODE_OPTIONS: --max-old-space-size=4096

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, tests, build and documentation
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint without modifying sources
        run: |
          bun run lint
          git diff --exit-code

      - name: Static safety checks
        run: |
          bun run sanity:templates
          bun run sanity:dependency-convergence
          bun run sanity:generated-secret-safety
          bun run sanity:source-hygiene
          bun run sanity:playwright
          bun run docs:check-human-style

      - name: Typecheck
        run: bun run typecheck

      - name: Build package
        run: bun run build

      - name: Test unit, integration and runtime end-to-end suites
        run: bun run test

      - name: Install Playwright Chromium
        run: bun run playwright:install:ci

      - name: Test browser functions with Playwright
        run: bun run test:playwright

      - name: Build docs
        run: bun run docs:build

      - name: CLI smoke and performance budgets
        run: |
          bun run cli:smoke
          bun run cli:bundle:check
          bun run cli:benchmark

      - name: Verify generated tree is clean
        run: git diff --exit-code

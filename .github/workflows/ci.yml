name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ${{ matrix.os }} (bun ${{ matrix.bun }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        bun: [1.3.6]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Nuxt module build uses Node APIs via toolchain; keep Node explicit for stability.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run test:types

      - name: Build module
        run: bun run test:build

      # Optionnel: si vous avez un script smoke CLI (sinon retirez)
      # - name: CLI smoke
      #   run: bun run test:cli

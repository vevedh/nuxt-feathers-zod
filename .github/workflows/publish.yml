name: Publish package and docs

on:
  workflow_dispatch:
    inputs:
      npm-tag:
        description: npm dist-tag to use
        required: false
        default: latest
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate package
        run: |
          bun run lint
          bun run sanity:templates
          bun run prepare
          bun run build
          bun run docs:build

      - name: Dry run pack
        run: npm pack --dry-run

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          INPUT_NPM_TAG: ${{ github.event.inputs.npm-tag }}
        run: |
          TAG="${INPUT_NPM_TAG:-latest}"
          npm publish --access public --tag "$TAG"

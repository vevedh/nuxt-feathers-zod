services:
  nfz-studio:
    image: ${NFZ_IMAGE:-nfz-studio}:${NFZ_VERSION:-6.4.106}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
        MONGO_URL: ${MONGO_URL}
        NFZ_WITH_MONGO_URL: ${NFZ_WITH_MONGO_URL}
        NFZ_ENABLE_SOCKETIO: ${NFZ_ENABLE_SOCKETIO:-false}
        NFZ_AUTH_PROVIDER: ${NFZ_AUTH_PROVIDER:-local}
        NFZ_MONGO_ADMIN_ENABLED: ${NFZ_MONGO_ADMIN_ENABLED:-true}
        NFZ_MONGO_ADMIN_DANGEROUS: ${NFZ_MONGO_ADMIN_DANGEROUS:-false}
        NFZ_PRODUCT_EDITION: ${NFZ_PRODUCT_EDITION:-community}
        NFZ_BUILDER_APPLY_MODE: ${NFZ_BUILDER_APPLY_MODE:-workspace}
        NFZ_DEVTOOLS_ENABLED: ${NFZ_DEVTOOLS_ENABLED:-false}
    container_name: nfz-studio
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${NFZ_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      MONGO_URL: ${MONGO_URL}
      NFZ_WITH_MONGO_URL: ${NFZ_WITH_MONGO_URL}
      NFZ_DATA_DIR: /data
      NFZ_WORKSPACE_DIR: /workspace
      NFZ_WORKSPACE_SEED_DIR: /opt/nfz/workspace-seed
      NFZ_FORCE_RESEED: ${NFZ_FORCE_RESEED:-false}
      NFZ_RESEED_ON_VERSION_CHANGE: ${NFZ_RESEED_ON_VERSION_CHANGE:-true}
      NFZ_BACKUP_WORKSPACE_ON_RESEED: ${NFZ_BACKUP_WORKSPACE_ON_RESEED:-true}
      NFZ_BUILDER_EXPORT_DIR: /data/exports
      NFZ_BUILDER_APPLY_MODE: ${NFZ_BUILDER_APPLY_MODE:-workspace}
      NFZ_DEVTOOLS_ENABLED: ${NFZ_DEVTOOLS_ENABLED:-false}
      NFZ_MONGO_ADMIN_ENABLED: ${NFZ_MONGO_ADMIN_ENABLED:-true}
      NFZ_MONGO_ADMIN_DANGEROUS: ${NFZ_MONGO_ADMIN_DANGEROUS:-false}
      NFZ_PRODUCT_EDITION: ${NFZ_PRODUCT_EDITION:-community}
      NFZ_LICENSE_ENFORCE: ${NFZ_LICENSE_ENFORCE:-false}
      NFZ_LICENSE_KEY: ${NFZ_LICENSE_KEY:-}
      NFZ_LICENSE_CUSTOMER: ${NFZ_LICENSE_CUSTOMER:-}
      NFZ_LICENSE_PLAN: ${NFZ_LICENSE_PLAN:-starter}
      NFZ_LICENSE_EXPIRES_AT: ${NFZ_LICENSE_EXPIRES_AT:-}
      NFZ_LICENSE_FEATURES: ${NFZ_LICENSE_FEATURES:-builder,diagnostics,mongo-admin,auth-demo,crud-demo}
      NFZ_LICENSE_GRACE_DAYS: ${NFZ_LICENSE_GRACE_DAYS:-7}
      NFZ_SEED_DUMMY_USER: ${NFZ_SEED_DUMMY_USER:-true}
      NFZ_DUMMY_USER_USERNAME: ${NFZ_DUMMY_USER_USERNAME:-admin}
      NFZ_DUMMY_USER_EMAIL: ${NFZ_DUMMY_USER_EMAIL:-admin@example.local}
      NFZ_DUMMY_USER_PASSWORD: ${NFZ_DUMMY_USER_PASSWORD:-ChangeMe123!}
      NFZ_DUMMY_USER_ROLES: ${NFZ_DUMMY_USER_ROLES:-admin}
      ADCS_ENABLED: ${ADCS_ENABLED:-false}
      ADCS_SCRIPT_PATH: ${ADCS_SCRIPT_PATH:-/srv/adcs-request-cli.sh}
      ADCS_WORK_ROOT: ${ADCS_WORK_ROOT:-/tmp/adcs}
      ADCS_BASH_PATH: ${ADCS_BASH_PATH:-/bin/bash}
      ADCS_JOB_TTL_MS: ${ADCS_JOB_TTL_MS:-1800000}
    volumes:
      - nfz_data:/data
      - nfz_workspace:/workspace
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: nfz-studio-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-changeMe}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  nfz_data:
  nfz_workspace:
